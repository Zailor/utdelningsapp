name: Uppdatera kursdata
# Hämtar inkrementell kursdata och committar resultatet.

on:
  schedule:
    # Mål: 17:45 svensk tid året runt (börsen stänger 17:30). GitHub-cron går i
    # UTC, så två triggers täcker sommar-/vintertid och vaktjobbet nedan
    # släpper bara igenom den som matchar Stockholms aktuella UTC-offset.
    - cron: "45 15 * * 1-5" # 17:45 CEST (sommartid)
    - cron: "45 16 * * 1-5" # 17:45 CET (vintertid)
  workflow_dispatch: # gör att körningen kan startas manuellt från Actions-fliken

concurrency:
  group: uppdatera-kursdata
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  vakt:
    runs-on: ubuntu-latest
    outputs:
      kor: ${{ steps.tid.outputs.kor }}
    steps:
      - name: Släpp igenom rätt säsongstrigger
        id: tid
        run: |
          OFFSET=$(TZ=Europe/Stockholm date +%z)
          CRON="${{ github.event.schedule }}"
          if [ -z "$CRON" ]; then
            echo "Manuell körning."; echo "kor=ja" >> "$GITHUB_OUTPUT"
          elif [ "$CRON" = "45 15 * * 1-5" ] && [ "$OFFSET" = "+0200" ]; then
            echo "Sommartid – kör."; echo "kor=ja" >> "$GITHUB_OUTPUT"
          elif [ "$CRON" = "45 16 * * 1-5" ] && [ "$OFFSET" = "+0100" ]; then
            echo "Vintertid – kör."; echo "kor=ja" >> "$GITHUB_OUTPUT"
          else
            echo "Fel säsongstrigger ($CRON vid offset $OFFSET) – hoppar över."
            echo "kor=nej" >> "$GITHUB_OUTPUT"
          fi

  fetch:
    needs: vakt
    if: needs.vakt.outputs.kor == 'ja'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Inkrementell hämtning: cachen i analysis/data/history gör att bara
      # svansen sedan förra körningen hämtas per aktie. --maxAge 6 gör en
      # omkörning samma dag gratis om jobbet skulle avbrytas halvvägs.
      # Vid 429 faller yahoo.js tillbaka på förinstallerad Chrome.
      - name: Hämta ny kursdata (inkrementellt)
        working-directory: analysis
        run: node src/cli.js --json --delay 2000 --maxAge 6

      - name: Exportera till appen
        working-directory: analysis
        run: node src/export.js --cachedOnly --maxAge 24 --delay 0

      - name: Committa uppdaterad data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add analysis/data prototype/data
          if git diff --cached --quiet; then
            echo "Ingen ny data att committa."
          else
            git commit -m "Data: daglig uppdatering $(date -u +%F)"
            git push
          fi
